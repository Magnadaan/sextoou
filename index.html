<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="img/sextou_favico.png">
  <title>Contagem para Sexta 🎉 - Completo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card">
  <h1 id="title">⏳ Sexta-feira está chegando!</h1>
  <div class="subtitle" id="subtitle">A sobrevivência semanal continua...</div>
  <div class="countdown">
    <div class="time-box"><div class="number" id="days">0</div><div class="label">Dias</div></div>
    <div class="time-box"><div class="number" id="hours">0</div><div class="label">Horas</div></div>
    <div class="time-box"><div class="number" id="minutes">0</div><div class="label">Minutos</div></div>
    <div class="time-box"><div class="number" id="seconds">0</div><div class="label">Segundos</div></div>
  </div>
  <div class="message" id="message">☕ Aguente firme...</div>
  <div id="sextouContainer" style="display:none;">
    <div class="sextou-text">🎉 SEXTOU!!! 🍻</div>
  </div>
  <footer id="footer">Feito para quem vive esperando a sexta 🎉</footer>
</div>

<!-- CARREGAMENTO DOS SCRIPTS: PRIMEIRO AS MENSAGENS, DEPOIS A LÓGICA -->
<script src="messages.js"></script>
<script src="script.js"></script>
</body>
</html>
